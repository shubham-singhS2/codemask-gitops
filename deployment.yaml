apiVersion: apps/v1
kind: Deployment
metadata:
  name: codemask
  namespace: codemask

spec:
  replicas: 2

  selector:
    matchLabels:
      app: codemask

  template:
    metadata:
      labels:
        app: codemask

    spec:
      containers:
        - name: codemask

          image: shubhamsinghs2/codemask:0724e3c

          imagePullPolicy: Always

          ports:
            - containerPort: 80

          resources:
            requests:
              cpu: 100m
              memory: 128Mi

            limits:
              cpu: 300m
              memory: 256Mi
